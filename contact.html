<body>
  <header class="site-header">
    <img class="site-logo" src="assets/images/logo/american-wildflowers-logo.png" alt="American Wildflowers logo" loading="eager" />
    <h1 class="site-title">Contact Us</h1>
    <p class="lede">Send questions, corrections, or partnership requests.</p>
    <nav aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="privacy.html">Privacy</a>

    </nav>
    <a class="header-cta cta-btn green" href="index.html#all-states">Browse All States</a>
  </header>

  <main id="content">
    <section class="section card" aria-labelledby="contact-title">
      <h2 id="contact-title">Get In Touch</h2>
      <p>Use the form below and we will respond as soon as possible.</p>
      <form action="#" method="post">
        <p>
          <label for="name">Name</label><br />
          <input id="name" name="name" type="text" autocomplete="name" required />
        </p>
        <p>
          <label for="email">Email</label><br />
          <input id="email" name="email" type="email" autocomplete="email" required />
        </p>
        <p>
          <label for="message">Message</label><br />
          <textarea id="message" name="message" rows="6" required></textarea>
        </p>
        <p>
          <button class="cta-btn green" type="submit">Send Message</button>
        </p>
      </form>
    </section>
  </main>

  <footer>
    <p>Generated from CSV data in this repository.</p>
